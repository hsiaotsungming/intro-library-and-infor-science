<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>人工智慧與圖書館｜圖書資訊傳播導論</title>
    <style>
      :root {
        color-scheme: light;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #172333;
        background: #f7f8fa;
        --ink: #172333;
        --muted: #53616f;
        --line: #d8dee6;
        --accent: #23557d;
        --green: #2d8a78;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: linear-gradient(180deg, #ffffff 0%, #f7f8fa 44%, #edf2f5 100%);
      }

      .site {
        width: min(1120px, calc(100% - 48px));
        margin: 0 auto;
        padding: 28px 0 72px;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 24px;
        padding-bottom: 52px;
      }

      .brand {
        display: grid;
        gap: 4px;
      }

      .brand-title {
        color: var(--ink);
        font-size: 1.08rem;
        font-weight: 700;
      }

      .header-actions {
        display: grid;
        justify-items: end;
        gap: 18px;
      }

      .lang-switch {
        display: inline-flex;
        padding: 4px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.92);
      }

      .lang-switch a {
        padding: 8px 14px;
        border-radius: 999px;
        color: var(--muted);
        text-decoration: none;
        font-size: 0.86rem;
        line-height: 1;
      }

      .lang-switch a.active {
        background: var(--ink);
        color: #ffffff;
      }

      .back-link {
        color: var(--muted);
        font-size: 0.95rem;
        text-decoration: none;
        border-bottom: 2px solid transparent;
        padding: 8px 0;
      }

      .back-link:hover {
        color: var(--accent);
        border-color: var(--green);
      }

      main {
        display: grid;
        gap: 36px;
      }

      .hero {
        max-width: 920px;
        padding-bottom: 44px;
        border-bottom: 1px solid var(--line);
      }

      .eyebrow {
        display: inline-block;
        margin-bottom: 18px;
        color: var(--green);
        font-size: 1.05rem;
        font-weight: 800;
      }

      h1,
      h2,
      p {
        margin: 0;
        letter-spacing: 0;
      }

      h1 {
        color: var(--ink);
        font-size: clamp(3rem, 6vw, 5.1rem);
        line-height: 1.04;
      }

      .section-list {
        display: grid;
        gap: 14px;
      }

      .section-card {
        display: grid;
        grid-template-columns: 120px minmax(0, 1fr);
        gap: 22px;
        align-items: start;
        padding: 24px 26px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.88);
      }

      .section-card-link {
        color: inherit;
        text-decoration: none;
      }

      .section-card-link:hover .section-card {
        border-color: #b8c7d6;
        box-shadow: 0 14px 32px rgba(23, 35, 51, 0.06);
      }

      .section-number {
        color: var(--green);
        font-size: 1rem;
        font-weight: 800;
      }

      .section-card h2 {
        color: var(--ink);
        font-size: clamp(1.45rem, 2vw, 1.9rem);
        line-height: 1.25;
      }

      .section-card p {
        margin-top: 8px;
        color: var(--muted);
        font-size: 1rem;
        line-height: 1.7;
      }

      @media (max-width: 760px) {
        .site {
          width: min(100% - 32px, 760px);
        }

        header {
          display: block;
        }

        .header-actions {
          justify-items: start;
          margin-top: 18px;
        }

        .back-link {
          display: inline-block;
        }

        .section-card {
          grid-template-columns: 1fr;
          gap: 12px;
        }
      }
    </style>
  </head>
  <body>
    <div class="site">
      <header>
        <div class="brand">
          <span class="brand-title">圖書資訊傳播導論</span>
        </div>

        <div class="header-actions">
          <div class="lang-switch" aria-label="語言切換">
            <a href="./index.html">ENG</a>
            <a class="active" href="./zh.html" aria-current="page">繁中</a>
          </div>

          <a class="back-link" href="../zh/index.html">回到首頁</a>
        </div>
      </header>

      <main>
        <section class="hero" aria-labelledby="page-title">
          <span class="eyebrow">單元 01</span>
          <h1 id="page-title">人工智慧與圖書館</h1>
        </section>

        <section class="section-list" aria-label="單元章節">
          <a class="section-card-link" href="./section-01-zh.html">
            <article class="section-card">
              <span class="section-number">章節 01</span>
              <div>
                <h2>人工智慧有智能嗎？</h2>
                <p>本節將從 Turing Test、大型語言模型、人類判斷線索與 Chinese Room 這幾個方向，思考人工智慧是否真的可以被稱為有智能。</p>
              </div>
            </article>
          </a>

          <a class="section-card-link" href="./section-02-zh.html">
            <article class="section-card">
              <span class="section-number">章節 02</span>
              <div>
                <h2>讀者能看到的 AI 應用</h2>
                <p>本節從固定問答與生成式互動的差異談起，再以國資圖與臺大圖書館的案例，說明 AI 如何進入圖書館讀者服務。</p>
              </div>
            </article>
          </a>

          <article class="section-card">
            <span class="section-number">章節 03</span>
            <div>
              <h2>回到圖書資訊學脈絡來閱讀</h2>
              <p>把人工智慧放回圖書資訊學脈絡來看，焦點不只是工具本身，也包括知識組織、資訊倫理與公共服務的角色。</p>
            </div>
          </article>
        </section>
      </main>
    </div>
  </body>
</html>
