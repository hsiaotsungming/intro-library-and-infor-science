<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Introduction to Library &amp; Information Science</title>
    <style>
      :root {
        color-scheme: light;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #1d2935;
        background: #f6f8fa;
        --ink: #172333;
        --muted: #5a6672;
        --line: #d8dee6;
        --accent: #23557d;
        --green: #2d8a78;
        --panel: rgba(255, 255, 255, 0.84);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: linear-gradient(180deg, #ffffff 0%, #f7f8fa 42%, #edf2f5 100%);
      }

      .site {
        width: min(1120px, calc(100% - 40px));
        margin: 0 auto;
        padding: 28px 0 56px;
      }

      header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 24px;
        padding-bottom: 44px;
      }

      .brand {
        display: grid;
        gap: 6px;
      }

      .brand strong {
        color: var(--ink);
        font-size: 1rem;
      }

      .brand span {
        color: var(--muted);
        font-size: 0.875rem;
      }

      .header-actions {
        display: grid;
        justify-items: end;
        gap: 18px;
      }

      .lang-switch {
        display: inline-flex;
        padding: 4px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.92);
      }

      .lang-switch a {
        padding: 8px 14px;
        border-radius: 999px;
        color: var(--muted);
        text-decoration: none;
        font-size: 0.86rem;
        line-height: 1;
      }

      .lang-switch a.active {
        background: var(--ink);
        color: #ffffff;
      }

      nav {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: flex-end;
      }

      nav a {
        padding: 8px 10px;
        color: #334155;
        text-decoration: none;
        font-size: 0.92rem;
        border-bottom: 2px solid transparent;
      }

      nav a:hover {
        border-color: var(--green);
      }

      .hero {
        max-width: 920px;
        padding-bottom: 44px;
        border-bottom: 1px solid var(--line);
      }

      h1,
      h2,
      h3,
      p {
        margin: 0;
        letter-spacing: 0;
      }

      .eyebrow {
        display: inline-block;
        margin-bottom: 18px;
        color: var(--green);
        font-size: 1rem;
        font-weight: 800;
      }

      h1 {
        margin-bottom: 12px;
        color: var(--ink);
        font-size: clamp(2.8rem, 5.4vw, 5.3rem);
        line-height: 1.04;
      }

      .section-heading {
        margin: 42px 0 18px;
      }

      h2 {
        color: var(--ink);
        font-size: 1.45rem;
      }

      .topics {
        display: grid;
        grid-template-columns: minmax(0, 360px);
        gap: 12px;
      }

      .topic {
        min-height: 220px;
        padding: 20px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
      }

      .topic-number {
        color: var(--green);
        font-size: 0.82rem;
        font-weight: 800;
      }

      h3 {
        margin: 12px 0 0;
        color: var(--ink);
        font-size: 1.32rem;
        line-height: 1.35;
      }

      .topic a {
        color: inherit;
        text-decoration: none;
      }

      .topic a:hover h3 {
        color: var(--accent);
      }

      @media (max-width: 920px) {
        header {
          display: block;
        }

        .header-actions {
          justify-items: start;
          margin-top: 18px;
        }

        nav {
          justify-content: flex-start;
        }

        .topics {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="site">
      <header>
        <div class="brand">
          <strong>Introduction to Library &amp; Information Science</strong>
        </div>

        <div class="header-actions">
          <div class="lang-switch" aria-label="Language switcher">
            <a class="active" href="./index.html" aria-current="page">ENG</a>
            <a href="./zh/index.html">繁中</a>
          </div>

          <nav aria-label="Primary Navigation">
            <a href="#home">Home</a>
            <a href="ai_and_library/index.html">AI &amp; Library</a>
          </nav>
        </div>
      </header>

      <main>
        <section class="hero" id="home" aria-labelledby="site-title">
          <span class="eyebrow">Course Site Sample</span>
          <h1 id="site-title">Introduction to Library &amp; Information Science</h1>
        </section>

        <section aria-labelledby="modules-title">
          <div class="section-heading">
            <h2 id="modules-title">Module</h2>
          </div>

          <div class="topics">
            <article class="topic">
              <a href="ai_and_library/index.html">
                <span class="topic-number">Module 01</span>
                <h3>AI &amp; Library</h3>
              </a>
            </article>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
